name: Build and Sign CI Release

on:
  workflow_dispatch: 
  push:
    branches: [ master, main, develop ] 

jobs:
  build:
    name: 编译
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        submodules: true
      
    - name: 设置 JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
        
    - name: 设置 Android SDK
      uses: android-actions/setup-android@v3
      
    - name: 安装 Android SDK 组件
      run: |
        yes | sdkmanager --licenses || true
        sdkmanager "build-tools;36.0.0"
        sdkmanager "platforms;android-36"
        sdkmanager "ndk;29.0.13113456"

    - name: 授予 gradlew 执行权限
      run: chmod +x gradlew
          
    - name: 编译 Release APK
      run: ./gradlew :manager:assembleRelease --stacktrace --no-daemon
      
    - name: 签名 (使用 Debug 默认密钥)
      run: |
        # 1. 生成一次性的 Debug 密钥
        mkdir -p ~/.android
        keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
        
        # 2. 抓取 APK
        APK_PATH=$(find out/apk -type f -name "*.apk" | head -n 1)
        echo "找到待签名 APK: $APK_PATH"
        
        # 3. 使用 apksigner 签名
        APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -r | head -n 1)
        $APKSIGNER sign --ks ~/.android/debug.keystore --ks-pass pass:android --key-pass pass:android "$APK_PATH"
        
        # 4. 把路径存入环境变量供下一步上传使用
        echo "SIGNED_APK_PATH=$APK_PATH" >> $GITHUB_ENV
        
    - name: 上传 Release 包
      uses: actions/upload-artifact@v4
      with:
        name: stellar-ci-release-signed
        path: ${{ env.SIGNED_APK_PATH }}
        retention-days: 7
